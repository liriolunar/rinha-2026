services:
  api1:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "120MB"

  api2:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "120MB"

  nginx:
    image: nginx:alpine
    platform: linux/amd64
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "50MB"

networks:
  rinha:
    driver: bridge
