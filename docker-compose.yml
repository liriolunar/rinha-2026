version: "3.8"

services:
  api1:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=9999
      - RESOURCES_PATH=/app/resources
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "120MB"

  api2:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=9999
      - RESOURCES_PATH=/app/resources
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "120MB"

  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "50MB"
